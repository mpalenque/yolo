<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuracion</title>
  <style>
    :root {
      --bg: #05070b;
      --panel: rgba(10, 14, 22, 0.82);
      --panel-border: rgba(255, 255, 255, 0.1);
      --text: #e7edf7;
      --muted: #9fb0c5;
      --accent: #54f2c2;
      --danger: #ff6b6b;
      --stage-left: 0px;
      --stage-top: 0px;
      --stage-width: 1152px;
      --stage-height: 768px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 20%, #111827 0%, #06080d 40%, #020305 100%);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    canvas {
      display: block;
      position: fixed;
      top: var(--stage-top);
      left: var(--stage-left);
      width: var(--stage-width);
      height: var(--stage-height);
      background: #000;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .status,
    .controls,
    .legend {
      position: absolute;
      pointer-events: auto;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    .status {
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      min-width: 240px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--danger);
      box-shadow: 0 0 16px currentColor;
      flex: 0 0 auto;
    }

    .dot.ok {
      background: var(--accent);
    }

    .status strong {
      display: block;
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    .status small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .controls {
      top: 16px;
      right: 16px;
      width: min(560px, calc(100vw - 32px));
      border-radius: 16px;
      overflow: hidden;
    }

    .controls summary {
      cursor: pointer;
      list-style: none;
      padding: 12px 14px;
      font-weight: 700;
      font-size: 13px;
      user-select: none;
      letter-spacing: 0.03em;
    }

    .controls summary::-webkit-details-marker {
      display: none;
    }

    .controls .body {
      padding: 0 14px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grid {
      display: grid;
      grid-column: 1 / -1;
      grid-template-columns: minmax(0, 1fr) 84px minmax(0, 1fr) 84px;
      gap: 7px 10px;
      align-items: center;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.15;
    }

    input[type="number"],
    input[type="range"],
    select {
      width: 100%;
    }

    input[type="number"],
    select {
      padding: 7px 8px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      outline: none;
      min-width: 0;
    }

    input[type="range"] {
      accent-color: var(--accent);
    }

    select option {
      color: #111827;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      justify-self: start;
    }

    .legend {
      left: 16px;
      bottom: 16px;
      width: min(320px, calc(100vw - 32px));
      padding: 10px 12px;
      border-radius: 14px;
    }

    .legend h2 {
      margin: 0 0 6px;
      font-size: 13px;
    }

    .legend p {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(84, 242, 194, 0.12);
      border: 1px solid rgba(84, 242, 194, 0.24);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .yellow-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: linear-gradient(180deg, #ffd700 0%, #f0c800 100%);
      color: #1a1a00;
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 28px;
      align-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      box-shadow: 0 3px 16px rgba(0,0,0,0.35);
      min-height: 48px;
    }
    .yellow-bar .yctrl {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1 1 220px;
      min-width: 190px;
    }
    .yellow-bar .yctrl label {
      font-size: 13px;
      font-weight: 800;
      color: #1a1a00;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .yellow-bar .yctrl input[type="range"] {
      flex: 1;
      accent-color: #b8860b;
      min-width: 100px;
      height: 22px;
    }
    .yellow-bar .yctrl .yval {
      min-width: 44px;
      text-align: right;
      font-size: 14px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: #332200;
    }
    .hud { top: 56px !important; }
    .status { top: 64px !important; }
    .controls { top: 64px !important; }

    .controls .body > button {
      width: 100%;
      padding: 9px 10px !important;
      font-size: 12px;
    }

    @media (max-width: 1200px), (max-height: 820px) {
      .controls {
        width: min(520px, calc(100vw - 24px));
        top: 12px;
        right: 12px;
      }

      .status,
      .legend {
        left: 12px;
      }

      .legend {
        bottom: 12px;
      }

      .grid {
        grid-template-columns: minmax(0, 1fr) 78px minmax(0, 1fr) 78px;
        gap: 6px 8px;
      }
    }

    @media (max-width: 880px) {
      .controls {
        width: min(460px, calc(100vw - 20px));
      }

      .controls .body {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: minmax(0, 1fr) 88px;
      }
    }

  </style>
</head>
<body>
  <div class="yellow-bar" id="yellowBar">
    <div class="yctrl">
      <label for="yOffsetY">Offset Y</label>
      <input id="yOffsetY" type="range" min="-500" max="500" step="1" value="0" />
      <span class="yval" id="yOffsetYVal">0</span>
    </div>
    <div class="yctrl">
      <label for="yMediaScale">Scale</label>
      <input id="yMediaScale" type="range" min="0.1" max="6" step="0.05" value="1" />
      <span class="yval" id="yMediaScaleVal">1.00</span>
    </div>
    <div class="yctrl">
      <label for="yParticlesLife">P. Life</label>
      <input id="yParticlesLife" type="range" min="0.1" max="12" step="0.1" value="2.8" />
      <span class="yval" id="yParticlesLifeVal">2.8</span>
    </div>
    <div class="yctrl">
      <label for="yMovieLife">Vida Películas</label>
      <input id="yMovieLife" type="range" min="0.5" max="15" step="0.1" value="1.6" />
      <span class="yval" id="yMovieLifeVal">1.6</span>
    </div>
    <div class="yctrl">
      <label for="yMaxTrackers">Max Track <small>(0=∞)</small></label>
      <input id="yMaxTrackers" type="range" min="0" max="20" step="1" value="0" />
      <span class="yval" id="yMaxTrackersVal">∞</span>
    </div>
    <button id="yBorderToggle" type="button" style="
      padding:6px 14px; border:2px solid #996600; border-radius:8px;
      background:#555; color:#fff; font-weight:800; font-size:12px;
      cursor:pointer; white-space:nowrap; text-transform:uppercase;
      letter-spacing:0.05em; min-height:34px;
    ">BORDE OFF</button>
    <div class="yctrl">
      <label for="yBorderWidth">Borde px</label>
      <input id="yBorderWidth" type="range" min="3" max="10" step="1" value="3" />
      <span class="yval" id="yBorderWidthVal">3</span>
    </div>
    <button id="btnRefreshFS2" type="button" style="
      padding:8px 16px; border:2px solid #996600; border-radius:8px;
      background:#cc8800; color:#fff; font-weight:800; font-size:13px;
      cursor:pointer; white-space:nowrap; text-transform:uppercase;
      letter-spacing:0.05em; min-height:36px;
    " onclick="fetch('/api/refresh-clients',{method:'POST'}).then(()=>{this.textContent='SENT!';setTimeout(()=>this.textContent='REFRESH FS2',1200)})">REFRESH FS2</button>
  </div>
  <canvas id="scene"></canvas>
  <video id="mediaTemplate" src="/media/visual-loop.mp4" muted playsinline preload="metadata" style="display:none"></video>

  <div class="hud">
    <div class="status">
      <div id="statusDot" class="dot"></div>
      <div>
        <strong id="statusTitle">Desconectado</strong>
        <small id="statusMeta">Esperando datos...</small>
      </div>
    </div>

    <details class="controls" open>
      <summary>CONFIGURACION VISUAL</summary>
      <div class="body">
        <div class="grid">
          <label for="roomWidth">Ancho area tracking (m)</label>
          <input id="roomWidth" type="number" min="1" max="50" step="0.1" value="5.0" />

          <label for="minDepth">Profundidad mínima (m)</label>
          <input id="minDepth" type="number" min="0.2" max="20" step="0.1" value="1.2" />

          <label for="maxDepth">Profundidad máxima (m)</label>
          <input id="maxDepth" type="number" min="1" max="50" step="0.1" value="12" />

          <label for="trackingDepthRel">Corte tracking fondo</label>
          <input id="trackingDepthRel" type="number" min="0" max="1" step="0.01" value="1" />

          <label for="cameraHeight">Altura webcam ArUco (m)</label>
          <input id="cameraHeight" type="number" min="0.1" max="5" step="0.01" value="3.0" />

          <label for="personHeight">Altura persona (m)</label>
          <input id="personHeight" type="number" min="0.5" max="3" step="0.01" value="1.7" />

          <label for="personWidth">Ancho persona (m)</label>
          <input id="personWidth" type="number" min="0.1" max="2" step="0.01" value="0.55" />

          <label for="heightScale">Escala alto</label>
          <input id="heightScale" type="number" min="0.2" max="4" step="0.01" value="1" />

          <label for="widthScale">Escala ancho</label>
          <input id="widthScale" type="number" min="0.2" max="4" step="0.01" value="1" />

          <label for="mediaScale">Escala imagen FS</label>
          <input id="mediaScale" type="number" min="0.1" max="6" step="0.01" value="1" />

          <label for="offsetX">Offset X (px)</label>
          <input id="offsetX" type="number" min="-2000" max="2000" step="1" value="0" />

          <label for="offsetY">Offset Y (px)</label>
          <input id="offsetY" type="number" min="-2000" max="2000" step="1" value="0" />

          <label for="bottomOffset">Offset piso (px)</label>
          <input id="bottomOffset" type="number" min="-300" max="300" step="1" value="0" />

          <label for="fov">FOV</label>
          <input id="fov" type="range" min="35" max="130" step="1" value="84" />

          <label for="flipDepth">Invertir profundidad</label>
          <input id="flipDepth" type="checkbox" />

          <label for="mirrorTracking">Invertir tracking horizontal</label>
          <input id="mirrorTracking" type="checkbox" />

          <label for="viewCamYaw">Cam /content yaw</label>
          <input id="viewCamYaw" type="number" min="-360" max="360" step="0.1" value="45" />

          <label for="viewCamPitch">Cam /content pitch</label>
          <input id="viewCamPitch" type="number" min="-89" max="89" step="0.1" value="37.2" />

          <label for="viewCamDist">Cam /content dist</label>
          <input id="viewCamDist" type="number" min="0.2" max="50" step="0.1" value="4.6" />

          <label for="viewTargetX">Target X</label>
          <input id="viewTargetX" type="number" min="-50" max="50" step="0.1" value="0" />

          <label for="viewTargetY">Target Y</label>
          <input id="viewTargetY" type="number" min="-10" max="10" step="0.1" value="0.25" />

          <label for="viewTargetZ">Target Z</label>
          <input id="viewTargetZ" type="number" min="-50" max="50" step="0.1" value="0" />

          <label for="particlesEnabled">Partículas on</label>
          <input id="particlesEnabled" type="checkbox" checked />

          <label for="particlesPreset">Preset partículas</label>
          <select id="particlesPreset">
            <option value="classic">Classic</option>
            <option value="flow">Flow</option>
          </select>

          <label for="particlesCount">Partículas cant.</label>
          <input id="particlesCount" type="number" min="0" max="200000" step="1" value="260" />

          <label for="particlesSize">Partículas tamaño</label>
          <input id="particlesSize" type="number" min="0.2" max="30" step="0.1" value="3.2" />

          <label for="particlesOpacity">Partículas opacidad</label>
          <input id="particlesOpacity" type="number" min="0" max="1" step="0.01" value="0.3" />

          <label for="particlesSpeed">Partículas velocidad</label>
          <input id="particlesSpeed" type="number" min="0" max="10" step="0.1" value="1.0" />

          <label for="particlesLife">Partículas lifetime</label>
          <input id="particlesLife" type="number" min="0.1" max="12" step="0.1" value="2.8" />
        </div>
        <button type="button" onclick="saveVisualConfig()" style="padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:rgba(84,242,194,0.12);color:var(--accent);font-weight:700;cursor:pointer;">Guardar visual/fullscreen</button>
        <button type="button" onclick="saveSharedViewConfig()" style="padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:rgba(84,242,194,0.08);color:var(--text);font-weight:700;cursor:pointer;">Guardar cámara /content</button>
      </div>
    </details>

    <div class="legend">
      <h2>Vista LED</h2>
      <p>
        Esta vista y Salida usan la altura de la pantalla LED para proyectar la escena.
        La altura de webcam se conserva aparte y solo se usa para ArUco y calibración.
      </p>
      <div class="badge">/ws/positions → LED</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');
    const mediaTemplate = document.getElementById('mediaTemplate');

    const statusDot = document.getElementById('statusDot');
    const statusTitle = document.getElementById('statusTitle');
    const statusMeta = document.getElementById('statusMeta');

    const controls = {
      roomWidth: document.getElementById('roomWidth'),
      minDepth: document.getElementById('minDepth'),
      maxDepth: document.getElementById('maxDepth'),
      trackingDepthRel: document.getElementById('trackingDepthRel'),
      cameraHeight: document.getElementById('cameraHeight'),
      personHeight: document.getElementById('personHeight'),
      personWidth: document.getElementById('personWidth'),
      heightScale: document.getElementById('heightScale'),
      widthScale: document.getElementById('widthScale'),
      mediaScale: document.getElementById('mediaScale'),
      offsetX: document.getElementById('offsetX'),
      offsetY: document.getElementById('offsetY'),
      bottomOffset: document.getElementById('bottomOffset'),
      fov: document.getElementById('fov'),
      flipDepth: document.getElementById('flipDepth'),
      mirrorTracking: document.getElementById('mirrorTracking'),
      viewCamYaw: document.getElementById('viewCamYaw'),
      viewCamPitch: document.getElementById('viewCamPitch'),
      viewCamDist: document.getElementById('viewCamDist'),
      viewTargetX: document.getElementById('viewTargetX'),
      viewTargetY: document.getElementById('viewTargetY'),
      viewTargetZ: document.getElementById('viewTargetZ'),
      particlesEnabled: document.getElementById('particlesEnabled'),
      particlesPreset: document.getElementById('particlesPreset'),
      particlesCount: document.getElementById('particlesCount'),
      particlesSize: document.getElementById('particlesSize'),
      particlesOpacity: document.getElementById('particlesOpacity'),
      particlesSpeed: document.getElementById('particlesSpeed'),
      particlesLife: document.getElementById('particlesLife'),
    };

    const yellowControls = {
      offsetY: document.getElementById('yOffsetY'),
      offsetYVal: document.getElementById('yOffsetYVal'),
      mediaScale: document.getElementById('yMediaScale'),
      mediaScaleVal: document.getElementById('yMediaScaleVal'),
      particlesLife: document.getElementById('yParticlesLife'),
      particlesLifeVal: document.getElementById('yParticlesLifeVal'),
      movieLife: document.getElementById('yMovieLife'),
      movieLifeVal: document.getElementById('yMovieLifeVal'),
      maxTrackers: document.getElementById('yMaxTrackers'),
      maxTrackersVal: document.getElementById('yMaxTrackersVal'),
      borderToggle: document.getElementById('yBorderToggle'),
      borderWidth: document.getElementById('yBorderWidth'),
      borderWidthVal: document.getElementById('yBorderWidthVal'),
    };

    const state = {
      ws: null,
      connected: false,
      cameraName: 'Sin fuente',
      lastMessageAt: 0,
      planeReady: false,
      people: new Map(),
      latestCount: 0,
      mediaWidth: 9,
      mediaHeight: 16,
      mediaAspect: 9 / 16,
      cameraHeightM: 3.0,
      screenHeightM: 3.0,
      screenWidthM: 4.5,
      stage: {
        width: 1152,
        height: 768,
        left: 0,
        top: 0,
      },
    };

    let visualSaveTimer = null;
    let sharedViewSaveTimer = null;
    let cameraHeightSaveTimer = null;
    let mirrorSaveTimer = null;
    let visualConfigDirtyUntil = 0;
    let sharedViewDirtyUntil = 0;
    let cameraHeightDirtyUntil = 0;
    let mirrorDirtyUntil = 0;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function isFiniteNumber(value) {
      return typeof value === 'number' && Number.isFinite(value);
    }

    function valueOf(input) {
      return parseFloat(input.value || '0') || 0;
    }

    function activeIs(el) {
      return document.activeElement === el;
    }

    function controlIsFocused(list) {
      const active = document.activeElement;
      return !!active && list.includes(active);
    }

    function editingVisualConfig() {
      return controlIsFocused([
        controls.roomWidth,
        controls.minDepth,
        controls.maxDepth,
        controls.trackingDepthRel,
        controls.personHeight,
        controls.personWidth,
        controls.heightScale,
        controls.widthScale,
        controls.mediaScale,
        controls.offsetX,
        controls.offsetY,
        controls.bottomOffset,
        controls.fov,
        controls.flipDepth,
        controls.mirrorTracking,
        controls.particlesEnabled,
        controls.particlesPreset,
        controls.particlesCount,
        controls.particlesSize,
        controls.particlesOpacity,
        controls.particlesSpeed,
        controls.particlesLife,
        yellowControls.offsetY,
        yellowControls.mediaScale,
        yellowControls.particlesLife,
        yellowControls.movieLife,
        yellowControls.maxTrackers,
        yellowControls.borderWidth,
      ]);
    }

    function editingSharedViewConfig() {
      return controlIsFocused([
        controls.viewCamYaw,
        controls.viewCamPitch,
        controls.viewCamDist,
        controls.viewTargetX,
        controls.viewTargetY,
        controls.viewTargetZ,
      ]);
    }

    const OUTPUT_ASPECT = 1152 / 768;

    function updateStageRect() {
      let stageWidth = window.innerWidth;
      let stageHeight = Math.round(stageWidth / OUTPUT_ASPECT);
      if (stageHeight > window.innerHeight) {
        stageHeight = window.innerHeight;
        stageWidth = Math.round(stageHeight * OUTPUT_ASPECT);
      }
      state.stage.width = Math.max(64, stageWidth);
      state.stage.height = Math.max(64, stageHeight);
      state.stage.left = Math.max(0, Math.round((window.innerWidth - state.stage.width) * 0.5));
      state.stage.top = Math.max(0, Math.round((window.innerHeight - state.stage.height) * 0.5));
      document.documentElement.style.setProperty('--stage-left', `${state.stage.left}px`);
      document.documentElement.style.setProperty('--stage-top', `${state.stage.top}px`);
      document.documentElement.style.setProperty('--stage-width', `${state.stage.width}px`);
      document.documentElement.style.setProperty('--stage-height', `${state.stage.height}px`);
    }

    function resizeCanvas() {
      updateStageRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.floor(state.stage.width * dpr);
      const height = Math.floor(state.stage.height * dpr);
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }

    window.addEventListener('resize', resizeCanvas, { passive: true });
    resizeCanvas();

    mediaTemplate.addEventListener('loadedmetadata', () => {
      if (mediaTemplate.videoWidth > 0 && mediaTemplate.videoHeight > 0) {
        state.mediaWidth = mediaTemplate.videoWidth;
        state.mediaHeight = mediaTemplate.videoHeight;
        state.mediaAspect = mediaTemplate.videoWidth / mediaTemplate.videoHeight;
      }
    });
    try { mediaTemplate.load(); } catch (_) {}

    function getVisualConfig() {
      const minDepth = Math.max(0.15, valueOf(controls.minDepth));
      const maxDepth = Math.max(minDepth + 0.1, valueOf(controls.maxDepth));
      return {
        roomWidth: Math.max(1, valueOf(controls.roomWidth)),
        minDepth,
        maxDepth,
        trackingMaxDepthRel: clamp(valueOf(controls.trackingDepthRel), 0, 1),
        cameraHeight: Math.max(0.1, state.cameraHeightM || valueOf(controls.cameraHeight)),
        personHeight: Math.max(0.4, valueOf(controls.personHeight)),
        personWidth: Math.max(0.1, valueOf(controls.personWidth)),
        heightScale: Math.max(0.2, valueOf(controls.heightScale)),
        widthScale: Math.max(0.2, valueOf(controls.widthScale)),
        mediaScale: Math.max(0.1, valueOf(controls.mediaScale)),
        offsetX: valueOf(controls.offsetX),
        offsetY: valueOf(controls.offsetY),
        bottomOffset: valueOf(controls.bottomOffset),
        fov: Math.max(35, Math.min(130, valueOf(controls.fov))),
        flipDepth: controls.flipDepth.checked,
        particlesPreset: controls.particlesPreset.value || 'classic',
        particlesLife: Math.max(0.1, valueOf(controls.particlesLife) || 2.8),
      };
    }

    function getSharedViewConfig() {
      return {
        yawDeg: valueOf(controls.viewCamYaw),
        pitchDeg: valueOf(controls.viewCamPitch),
        distance: Math.max(0.2, valueOf(controls.viewCamDist)),
        targetX: valueOf(controls.viewTargetX),
        targetY: valueOf(controls.viewTargetY),
        targetZ: valueOf(controls.viewTargetZ),
      };
    }

    function canApplyField(el, dirtyUntil, force = false) {
      if (activeIs(el)) return false;
      if (!force && performance.now() < dirtyUntil) return false;
      return true;
    }

    function setInputValueIfAllowed(el, value, dirtyUntil, force = false) {
      if (!canApplyField(el, dirtyUntil, force)) return;
      el.value = String(value);
    }

    function setCheckboxValueIfAllowed(el, value, dirtyUntil, force = false) {
      if (!canApplyField(el, dirtyUntil, force)) return;

    async function saveMirrorTracking() {

    function connect() {
      const scheme = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${scheme}://${location.host}/ws/positions`);
      state.ws = ws;

      ws.onopen = () => {
        state.connected = true;
        state.lastMessageAt = performance.now();
        updateStatus();
      };

      ws.onclose = () => {
        state.connected = false;
        updateStatus();
        setTimeout(connect, 2000);
      };

      ws.onerror = () => {
        try { ws.close(); } catch (_) {}
      };

      ws.onmessage = (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch {
          return;
        }
        if (data.type !== 'positions') return;

        state.lastMessageAt = performance.now();
        state.cameraName = data.camera_name || 'Camera';
        state.planeReady = Boolean(data.plane_ready);
        state.latestCount = Array.isArray(data.people) ? data.people.length : 0;

        applySharedViewConfig(data.view_config || null);
        applyVisualConfig(data.visual_config || null);

        if (
          isFiniteNumber(data.camera_height_m) &&
          performance.now() >= cameraHeightDirtyUntil &&
          !activeIs(controls.cameraHeight)
        ) {
          state.cameraHeightM = Math.max(0.1, Number(data.camera_height_m));
          controls.cameraHeight.value = state.cameraHeightM.toFixed(2);
        }
        if (data.screen_config && typeof data.screen_config === 'object' && Number.isFinite(Number(data.screen_config.height_m))) {
          state.screenHeightM = Math.max(0.2, Number(data.screen_config.height_m));
        }
        if (data.screen_config && typeof data.screen_config === 'object' && Number.isFinite(Number(data.screen_config.width_m))) {
          state.screenWidthM = Math.max(0.2, Number(data.screen_config.width_m));
        }
        if (data.mirror_x !== undefined) {
          applyMirrorValue(data.mirror_x);
        }

        const incomingIds = new Set();
        const now = performance.now();
        for (const payload of data.people || []) {
          const id = Number(payload.id ?? 0);
          incomingIds.add(id);
          const current = state.people.get(id) || {
            id,
            displayU: isFiniteNumber(payload.u) ? payload.u : 0.5,
            displayV: isFiniteNumber(payload.depth_rel) ? payload.depth_rel : (isFiniteNumber(payload.v) ? payload.v : 0.5),
            targetU: isFiniteNumber(payload.u) ? payload.u : 0.5,
            targetV: isFiniteNumber(payload.depth_rel) ? payload.depth_rel : (isFiniteNumber(payload.v) ? payload.v : 0.5),
            displayX: isFiniteNumber(payload.x) ? payload.x : 0,
            displayY: isFiniteNumber(payload.y) ? payload.y : 0,
            displayZ: isFiniteNumber(payload.z) ? payload.z : 0,
            targetX: isFiniteNumber(payload.x) ? payload.x : null,
            targetY: isFiniteNumber(payload.y) ? payload.y : null,
            targetZ: isFiniteNumber(payload.z) ? payload.z : null,
            lastSeen: now,
          };
          if (isFiniteNumber(payload.u)) current.targetU = payload.u;
          if (isFiniteNumber(payload.depth_rel)) current.targetV = payload.depth_rel;
          else if (isFiniteNumber(payload.v)) current.targetV = payload.v;
          if (isFiniteNumber(payload.x)) current.targetX = payload.x;
          if (isFiniteNumber(payload.y)) current.targetY = payload.y;
          if (isFiniteNumber(payload.z)) current.targetZ = payload.z;
          current.lastSeen = now;
          state.people.set(id, current);
        }

        for (const [id, person] of state.people) {
          if (!incomingIds.has(id) && performance.now() - person.lastSeen > 700) {
            state.people.delete(id);
          }
        }

        updateStatus();
      };
    }

    function computeMediaRect(projectedRect, mediaScale) {
      const mediaWidth = Math.max(1, state.mediaWidth || 9);
      const mediaHeight = Math.max(1, state.mediaHeight || 16);
      const fitScale = Math.min(
        projectedRect.rectWidth / mediaWidth,
        projectedRect.rectHeight / mediaHeight,
      );
      const drawWidth = Math.max(1, mediaWidth * fitScale * mediaScale);
      const drawHeight = Math.max(1, mediaHeight * fitScale * mediaScale);
      return {
        mediaWidth: drawWidth,
        mediaHeight: drawHeight,
        mediaX: projectedRect.centerPx - drawWidth * 0.5,
        mediaY: projectedRect.feetY - drawHeight,
      };
    }

    function projectPerson(person, cfg, width, height) {
      const projectionWidthM = Math.max(0.2, cfg.roomWidth || 5.0);
      const u = clamp(person.displayU, 0, 1);
      const vRaw = clamp(person.displayV, 0, 1);
      const v = cfg.flipDepth ? 1 - vRaw : vRaw;
      const hasPhysicalXZ = isFiniteNumber(person.displayX) && isFiniteNumber(person.displayZ);
      const baseWorldX = hasPhysicalXZ ? Number(person.displayX) : (u - 0.5) * projectionWidthM;
      const worldZ = Math.max(0.15, hasPhysicalXZ ? Math.abs(Number(person.displayZ)) : (cfg.minDepth + v * (cfg.maxDepth - cfg.minDepth)));
      const depthFactor = clamp(v, 0, 1);
      const horizontalBoost = 1 + (depthFactor * 0.7);
      const worldX = (baseWorldX + 0.2) * horizontalBoost;
      const bodyHeightM = cfg.personHeight * cfg.heightScale;
      const bodyWidthM = cfg.personWidth * cfg.widthScale;
      const sidePadding = width * 0.08;
      const usableWidth = Math.max(64, width - sidePadding * 2);
      const normalizedX = clamp((worldX / projectionWidthM) + 0.5, 0, 1);
      const centerPx = sidePadding + (normalizedX * usableWidth) + cfg.offsetX;
      const scaleBoost = 3.82;
      const baseHeightPx = height * 0.14;
      const depthSizeFactor = 1 - (depthFactor * 0.1);
      const rectHeight = Math.max(36, baseHeightPx * bodyHeightM * scaleBoost * depthSizeFactor);
      const rectWidth = Math.max(18, rectHeight * (bodyWidthM / Math.max(0.1, bodyHeightM)));
      const downwardShiftPx = (0.2 / Math.max(0.2, state.screenHeightM || 3.0)) * height;
      const floorMargin = Math.max(2, height * 0.003);
      const visibleFeetY = Math.min(
        height - floorMargin,
        Math.max(rectHeight + floorMargin, height - floorMargin + cfg.bottomOffset + downwardShiftPx)
      );
      const feetY = visibleFeetY - cfg.offsetY;
      const headY = feetY - rectHeight;
      const mediaRect = computeMediaRect({ rectWidth, rectHeight, centerPx, feetY }, cfg.mediaScale);
      return {
        id: person.id,
        depth: worldZ,
        x: centerPx - rectWidth / 2,
        y: headY + cfg.offsetY,
        width: rectWidth,
        height: rectHeight,
        centerX: centerPx,
        feetY: feetY + cfg.offsetY,
        mediaX: mediaRect.mediaX,
        mediaY: mediaRect.mediaY + cfg.offsetY,
        mediaWidth: mediaRect.mediaWidth,
        mediaHeight: mediaRect.mediaHeight,
      };
    }

    function drawBackground(width, height, cfg) {
      const projectionWidthM = Math.max(0.2, cfg.roomWidth || 5.0);
      const grad = ctx.createLinearGradient(0, 0, 0, height);
      grad.addColorStop(0, '#0d1522');
      grad.addColorStop(0.48, '#0b1018');
      grad.addColorStop(1, '#020305');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);

      const floorY = height - Math.max(2, height * 0.003) + cfg.bottomOffset + cfg.offsetY;
      const sidePadding = width * 0.08;
      const usableWidth = Math.max(64, width - sidePadding * 2);

      ctx.strokeStyle = 'rgba(120, 170, 255, 0.10)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sidePadding, floorY);
      ctx.lineTo(width - sidePadding, floorY);
      ctx.stroke();

      for (let x = 0; x <= projectionWidthM + 0.001; x += 1) {
        ctx.strokeStyle = 'rgba(120, 170, 255, 0.08)';
        const normalizedX = x / projectionWidthM;
        const px = sidePadding + normalizedX * usableWidth;
        ctx.beginPath();
        ctx.moveTo(px, floorY - 120);
        ctx.lineTo(px, floorY + 6);
        ctx.stroke();
      }

      ctx.fillStyle = 'rgba(190, 220, 255, 0.92)';
      ctx.font = '700 12px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(`Area plana ${projectionWidthM.toFixed(1)}m x 4.0m`, width * 0.5, Math.max(18, floorY - 132));
    }

    function roundRect(context, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      context.beginPath();
      context.moveTo(x + r, y);
      context.arcTo(x + width, y, x + width, y + height, r);
      context.arcTo(x + width, y + height, x, y + height, r);
      context.arcTo(x, y + height, x, y, r);
      context.arcTo(x, y, x + width, y, r);
      context.closePath();
    }

    function drawPerson(projected) {
      const hue = (projected.id * 67) % 360;
      const fill = `hsla(${hue}, 82%, 60%, 0.18)`;
      const stroke = `hsla(${hue}, 92%, 68%, 0.92)`;
      const glow = `hsla(${hue}, 100%, 70%, 0.22)`;
      const radius = Math.min(18, projected.mediaWidth * 0.2);

      ctx.shadowColor = glow;
      ctx.shadowBlur = 18;
      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 2;
      roundRect(ctx, projected.mediaX, projected.mediaY, projected.mediaWidth, projected.mediaHeight, radius);
      ctx.fill();
      ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.fillStyle = stroke;
      ctx.font = '700 13px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText(`#${projected.id}`, projected.centerX, projected.mediaY - 8);
    }

    function animate() {
      resizeCanvas();

      const width = state.stage.width;
      const height = state.stage.height;
      const now = performance.now();
      const cfg = getVisualConfig();

      drawBackground(width, height, cfg);
      const projected = [];
      for (const [id, person] of state.people) {
        const alpha = Math.min(0.22, (now - person.lastSeen) < 200 ? 0.16 : 0.08);
        person.displayU += (person.targetU - person.displayU) * alpha;
        person.displayV += (person.targetV - person.displayV) * alpha;
        if (isFiniteNumber(person.targetX)) person.displayX += (person.targetX - person.displayX) * alpha;
        if (isFiniteNumber(person.targetY)) person.displayY += (person.targetY - person.displayY) * alpha;
        if (isFiniteNumber(person.targetZ)) person.displayZ += (person.targetZ - person.displayZ) * alpha;

        if (now - person.lastSeen > 1600) {
          state.people.delete(id);
          continue;
        }
        projected.push(projectPerson(person, cfg, width, height));
      }

      projected.sort((a, b) => b.depth - a.depth);
      for (const item of projected) drawPerson(item);

      updateStatus();
      requestAnimationFrame(animate);
    }

    state.cameraHeightM = valueOf(controls.cameraHeight);
    loadVisualConfig();
    connect();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
