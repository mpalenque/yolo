<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview</title>
  <style>
    :root {
      --bg: #050505;
      --fg: #e8e8e8;
      --accent: #00ff88;
      --warn: #ffaa00;
      --danger: #ff4444;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #stage {
      width: 100%;
      height: 100%;
      position: relative;
      background: radial-gradient(circle at center, #121212 0%, #060606 70%);
    }
    #view {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    #view.dragging {
      cursor: grabbing;
    }
    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #333;
      background: rgba(0,0,0,.45);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
    }
    .ok { color: var(--accent); border-color: var(--accent); }
    .ok .dot { background: var(--accent); }
    .bad { color: var(--danger); border-color: var(--danger); }
    .bad .dot { background: var(--danger); }
    .ctrl-row {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }
    .ctrl-btn {
      border: 1px solid #333;
      background: rgba(0,0,0,.55);
      color: var(--fg);
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
    }
    .ctrl-btn.on {
      border-color: var(--accent);
      color: var(--accent);
    }
    .mini-panel {
      position: fixed;
      right: 14px;
      top: 54px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid #333;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(10px);
      font-size: 12px;
    }
    .mini-panel label {
      color: #cfcfcf;
    }
    .mini-panel input {
      width: 86px;
      border: 1px solid #333;
      background: rgba(0,0,0,.55);
      color: var(--fg);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
    }
    .mini-panel .ctrl-btn {
      padding: 6px 10px;
    }
    .hint {
      position: fixed;
      left: 14px;
      bottom: 14px;
      z-index: 20;
      font-size: 11px;
      color: #aaa;
      background: rgba(0,0,0,.45);
      border: 1px solid #2f2f2f;
      border-radius: 8px;
      padding: 7px 10px;
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="view"></canvas>
  </div>
  <div class="hud">
    <div id="conn" class="pill"><span class="dot"></span><span>Conectando…</span></div>
    <div id="plane" class="pill"><span class="dot"></span><span>Plano: pendiente</span></div>
    <div id="meta" class="pill"><span>People: 0</span></div>
    <div id="cam" class="pill"><span>Cam: iso</span></div>
    <div id="follow" class="pill"><span>Follow: off</span></div>
    <div id="xyz" class="pill"><span>XYZ: —</span></div>
  </div>
  <div class="ctrl-row">
    <button id="btn-debug" class="ctrl-btn" type="button">Debug Grid</button>
    <button id="btn-freeze" class="ctrl-btn" type="button">Freeze Trails</button>
    <button id="btn-top" class="ctrl-btn" type="button">Top View</button>
    <button id="btn-iso-lock" class="ctrl-btn" type="button">Isometric Lock</button>
    <input id="follow-id" type="number" min="0" placeholder="ID"
      style="width:68px;border:1px solid #333;background:rgba(0,0,0,.55);color:var(--fg);border-radius:999px;padding:6px 10px;font-size:12px;" />
    <button id="btn-follow" class="ctrl-btn" type="button">Follow ID</button>
    <button id="btn-follow-auto" class="ctrl-btn" type="button">Auto Follow</button>
    <button id="btn-follow-off" class="ctrl-btn" type="button">Follow Off</button>
    <button id="btn-reset" class="ctrl-btn" type="button">Reset Cam</button>
    <button id="btn-load-shared" class="ctrl-btn" type="button">Load Shared Cam</button>
    <button id="btn-save-shared" class="ctrl-btn" type="button">Save Shared Cam</button>
  </div>
  <div class="mini-panel">
    <label for="particles-life">Particle life x</label>
    <input id="particles-life" type="number" min="0.1" max="12" step="0.1" value="2.8" />
    <button id="btn-save-particles" class="ctrl-btn" type="button">Save Particles</button>
  </div>
  <div class="hint">Arrastrar: orbitar · Shift+Arrastrar: pan · Rueda: zoom</div>

  <script>
    const stage = document.getElementById('stage');
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d');
    const connEl = document.getElementById('conn');
    const planeEl = document.getElementById('plane');
    const metaEl = document.getElementById('meta');
    const camEl = document.getElementById('cam');
    const followEl = document.getElementById('follow');
    const xyzEl = document.getElementById('xyz');
    const btnDebug = document.getElementById('btn-debug');
    const btnFreeze = document.getElementById('btn-freeze');
    const btnTop = document.getElementById('btn-top');
    const btnIsoLock = document.getElementById('btn-iso-lock');
    const followIdInput = document.getElementById('follow-id');
    const btnFollow = document.getElementById('btn-follow');
    const btnFollowAuto = document.getElementById('btn-follow-auto');
    const btnFollowOff = document.getElementById('btn-follow-off');
    const btnReset = document.getElementById('btn-reset');
    const btnLoadShared = document.getElementById('btn-load-shared');
    const btnSaveShared = document.getElementById('btn-save-shared');
    const particlesLifeInput = document.getElementById('particles-life');
    const btnSaveParticles = document.getElementById('btn-save-particles');

    let debugEnabled = false;
    let freezeEnabled = false;
    let topViewEnabled = false;
    let isoLockEnabled = false;
    let followEnabled = false;
    let followAuto = false;
    let followId = null;
    let lastPeople = [];
    let planeReady = false;
    let markerSizeM = 0.12;
    let realCameraHeightM = 0.94;
    let cameraName = 'Camera';
    let markerId = 0;
    let screenConfig = { enabled: true, x_m: 0.0, z_m: 1.2, width_m: 3.5, height_m: 2.0, yaw_deg: 0.0 };

    const camera = {
      yaw: Math.PI / 4,
      pitch: 0.65,
      distance: 4.6,
      target: { x: 0, y: 0.25, z: 0 },
      fov: 58 * Math.PI / 180,
    };

    const pointerState = {
      down: false,
      mode: 'orbit',
      x: 0,
      y: 0,
    };

    let sharedViewSaveTimer = null;
    let sharedViewDirtyUntil = 0;
    let visualSaveTimer = null;
    let visualConfigDirtyUntil = 0;
    let sharedVisualConfig = {
      particles_life: 2.8,
    };

    function applySharedViewConfig(cfg, force = false) {
      if (!cfg || typeof cfg !== 'object') return;
      if (!force && (pointerState.down || performance.now() < sharedViewDirtyUntil)) return;
      if (cfg.content_yaw_deg !== undefined) camera.yaw = (Number(cfg.content_yaw_deg) * Math.PI) / 180;
      if (cfg.content_pitch_deg !== undefined) camera.pitch = (Number(cfg.content_pitch_deg) * Math.PI) / 180;
      if (cfg.content_distance_m !== undefined) camera.distance = Math.max(0.2, Number(cfg.content_distance_m));
      camera.target = {
        x: cfg.content_target_x_m !== undefined ? Number(cfg.content_target_x_m) : camera.target.x,
        y: cfg.content_target_y_m !== undefined ? Number(cfg.content_target_y_m) : camera.target.y,
        z: cfg.content_target_z_m !== undefined ? Number(cfg.content_target_z_m) : camera.target.z,
      };
      updateCamHud();
    }

    function currentSharedViewConfig() {
      return {
        content_yaw_deg: camera.yaw * 180 / Math.PI,
        content_pitch_deg: camera.pitch * 180 / Math.PI,
        content_distance_m: camera.distance,
        content_target_x_m: camera.target.x,
        content_target_y_m: camera.target.y,
        content_target_z_m: camera.target.z,
      };
    }

    function applySharedVisualConfig(cfg, force = false) {
      if (!cfg || typeof cfg !== 'object') return;
      if (!force && (document.activeElement === particlesLifeInput || performance.now() < visualConfigDirtyUntil)) return;
      if (cfg.particles_life !== undefined) {
        const nextLife = clamp(Number(cfg.particles_life) || sharedVisualConfig.particles_life || 2.8, 0.1, 12);
        sharedVisualConfig.particles_life = nextLife;
        particlesLifeInput.value = nextLife.toFixed(1);
      }
    }

    async function loadSharedViewConfig() {
      try {
        const res = await fetch('/api/view-config');
        const data = await res.json();
        if (data && data.ok) applySharedViewConfig(data.view_config || {}, true);
      } catch (_) {}
    }

    async function loadSharedVisualConfig() {
      try {
        const res = await fetch('/api/visual-config');
        const data = await res.json();
        if (data && data.ok) applySharedVisualConfig(data.visual_config || {}, true);
      } catch (_) {}
    }

    async function saveSharedViewConfig() {
      sharedViewDirtyUntil = performance.now() + 2200;
      try {
        const res = await fetch('/api/view-config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentSharedViewConfig()),
        });
        const data = await res.json();
        if (data && data.ok) applySharedViewConfig(data.view_config || {}, true);
        sharedViewDirtyUntil = 0;
      } catch (_) {}
    }

    function currentSharedVisualConfig() {
      return {
        particles_life: clamp(parseFloat(particlesLifeInput.value || '2.8') || 2.8, 0.1, 12),
      };
    }

    async function saveSharedVisualConfig() {
      visualConfigDirtyUntil = performance.now() + 2200;
      const payload = currentSharedVisualConfig();
      try {
        const res = await fetch('/api/visual-config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data && data.ok) applySharedVisualConfig(data.visual_config || payload, true);
        visualConfigDirtyUntil = 0;
      } catch (_) {}
    }

    function scheduleSharedViewSave() {
      sharedViewDirtyUntil = performance.now() + 2200;
      if (sharedViewSaveTimer) clearTimeout(sharedViewSaveTimer);
      sharedViewSaveTimer = setTimeout(() => {
        sharedViewSaveTimer = null;
        saveSharedViewConfig();
      }, 260);
    }

    function scheduleSharedVisualSave() {
      visualConfigDirtyUntil = performance.now() + 2200;
      if (visualSaveTimer) clearTimeout(visualSaveTimer);
      visualSaveTimer = setTimeout(() => {
        visualSaveTimer = null;
        saveSharedVisualConfig();
      }, 260);
    }

    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }

    function saveUiState() {
      try {
        localStorage.setItem('content.debugEnabled', debugEnabled ? '1' : '0');
        localStorage.setItem('content.freezeEnabled', freezeEnabled ? '1' : '0');
        localStorage.setItem('content.topViewEnabled', topViewEnabled ? '1' : '0');
        localStorage.setItem('content.isoLockEnabled', isoLockEnabled ? '1' : '0');
        localStorage.setItem('content.followEnabled', followEnabled ? '1' : '0');
        localStorage.setItem('content.followAuto', followAuto ? '1' : '0');
        localStorage.setItem('content.followId', followId === null ? '' : String(followId));
      } catch (_) {}
    }

    function loadUiState() {
      try {
        return {
          debugEnabled: localStorage.getItem('content.debugEnabled') === '1',
          freezeEnabled: localStorage.getItem('content.freezeEnabled') === '1',
          topViewEnabled: localStorage.getItem('content.topViewEnabled') === '1',
          isoLockEnabled: localStorage.getItem('content.isoLockEnabled') === '1',
          followEnabled: localStorage.getItem('content.followEnabled') === '1',
          followAuto: localStorage.getItem('content.followAuto') === '1',
          followId: localStorage.getItem('content.followId'),
        };
      } catch (_) {
        return { debugEnabled: false, freezeEnabled: false, topViewEnabled: false, isoLockEnabled: false, followEnabled: false, followAuto: false, followId: null };
      }
    }

    function updateFollowHud() {
      if (!followEnabled) {
        followEl.innerHTML = '<span>Follow: off</span>';
        btnFollow.classList.remove('on');
        btnFollowAuto.classList.remove('on');
        return;
      }
      if (followAuto) {
        followEl.innerHTML = '<span>Follow: auto</span>';
        btnFollow.classList.remove('on');
        btnFollowAuto.classList.add('on');
      } else {
        followEl.innerHTML = `<span>Follow: ID ${followId ?? '—'}</span>`;
        btnFollow.classList.add('on');
        btnFollowAuto.classList.remove('on');
      }
    }

    function setFollowMode(mode) {
      if (mode === 'off') {
        followEnabled = false;
        followAuto = false;
      } else if (mode === 'auto') {
        followEnabled = true;
        followAuto = true;
      } else {
        const parsed = parseInt(followIdInput.value || '', 10);
        if (!Number.isFinite(parsed)) return;
        followId = Math.max(0, parsed);
        followIdInput.value = String(followId);
        followEnabled = true;
        followAuto = false;
      }
      updateFollowHud();
      saveUiState();
    }

    function setConn(ok, text) {
      connEl.className = `pill ${ok ? 'ok' : 'bad'}`;
      connEl.innerHTML = `<span class="dot"></span><span>${text}</span>`;
    }

    function setPlane(ok) {
      planeReady = !!ok;
      planeEl.className = `pill ${ok ? 'ok' : 'bad'}`;
      planeEl.innerHTML = `<span class="dot"></span><span>Plano: ${ok ? 'listo' : 'pendiente'}</span>`;
    }

    function resetCamera() {
      camera.yaw = Math.PI / 4;
      camera.pitch = 0.65;
      camera.distance = 4.6;
      camera.target = { x: 0, y: 0.25, z: 0 };
      topViewEnabled = false;
      btnTop.classList.remove('on');
      saveUiState();
      updateCamHud();
    }

    function applyTopView(enabled) {
      topViewEnabled = !!enabled;
      if (topViewEnabled) {
        camera.yaw = 0;
        camera.pitch = 1.49;
        camera.distance = 4.0;
        camera.target = { x: 0, y: 0.0, z: 0 };
      } else {
        camera.yaw = Math.PI / 4;
        camera.pitch = 0.65;
        camera.distance = 4.6;
        camera.target = { x: 0, y: 0.25, z: 0 };
      }
      btnTop.classList.toggle('on', topViewEnabled);
      saveUiState();
      updateCamHud();
    }

    function setIsoLock(enabled) {
      isoLockEnabled = !!enabled;
      btnIsoLock.classList.toggle('on', isoLockEnabled);
      saveUiState();
    }

    function updateCamHud() {
      const deg = (r) => Math.round((r * 180 / Math.PI) * 10) / 10;
      camEl.innerHTML = `<span>Cam yaw ${deg(camera.yaw)}° · pitch ${deg(camera.pitch)}° · zoom ${camera.distance.toFixed(2)}</span>`;
    }

    function resizeCanvas() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const w = stage.clientWidth;
      const h = stage.clientHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function getCameraBasis() {
      const cp = Math.cos(camera.pitch);
      const sp = Math.sin(camera.pitch);
      const cy = Math.cos(camera.yaw);
      const sy = Math.sin(camera.yaw);

      const pos = {
        x: camera.target.x + camera.distance * cp * sy,
        y: camera.target.y + camera.distance * sp,
        z: camera.target.z + camera.distance * cp * cy,
      };

      const fx = camera.target.x - pos.x;
      const fy = camera.target.y - pos.y;
      const fz = camera.target.z - pos.z;
      const fl = Math.hypot(fx, fy, fz) || 1;
      const forward = { x: fx / fl, y: fy / fl, z: fz / fl };

      const up0 = { x: 0, y: 1, z: 0 };
      const rx = up0.y * forward.z - up0.z * forward.y;
      const ry = up0.z * forward.x - up0.x * forward.z;
      const rz = up0.x * forward.y - up0.y * forward.x;
      const rl = Math.hypot(rx, ry, rz) || 1;
      const right = { x: rx / rl, y: ry / rl, z: rz / rl };

      const ux = forward.y * right.z - forward.z * right.y;
      const uy = forward.z * right.x - forward.x * right.z;
      const uz = forward.x * right.y - forward.y * right.x;
      const up = { x: ux, y: uy, z: uz };

      return { pos, forward, right, up };
    }

    function project(point, basis, width, height) {
      const relx = point.x - basis.pos.x;
      const rely = point.y - basis.pos.y;
      const relz = point.z - basis.pos.z;

      const cx = relx * basis.right.x + rely * basis.right.y + relz * basis.right.z;
      const cy = relx * basis.up.x + rely * basis.up.y + relz * basis.up.z;
      const cz = relx * basis.forward.x + rely * basis.forward.y + relz * basis.forward.z;

      if (cz <= 0.03) return null;

      const focal = (Math.min(width, height) * 0.5) / Math.tan(camera.fov * 0.5);
      const sx = (width * 0.5) + (cx / cz) * focal;
      const sy = (height * 0.5) - (cy / cz) * focal;
      return { x: sx, y: sy, z: cz };
    }

    function worldFromPlane(u, v) {
      return {
        x: (u - 0.5) * 2.0,
        y: 0,
        z: (v - 0.5) * 2.0,
      };
    }

    function worldFromPayload(person) {
      if (
        typeof person.x === 'number' &&
        typeof person.y === 'number' &&
        typeof person.z === 'number'
      ) {
        return { x: person.x, y: person.y, z: person.z };
      }
      return worldFromPlane(person.u, person.v);
    }

    function updateFollowTarget() {
      if (!followEnabled || !Array.isArray(lastPeople) || lastPeople.length === 0) {
        return;
      }

      let targetPerson = null;
      if (followAuto) {
        let best = Number.POSITIVE_INFINITY;
        for (const p of lastPeople) {
          if (typeof p.u !== 'number' || typeof p.v !== 'number') continue;
          const du = p.u - 0.5;
          const dv = p.v - 0.5;
          const dist2 = du * du + dv * dv;
          if (dist2 < best) {
            best = dist2;
            targetPerson = p;
          }
        }
      } else {
        targetPerson = lastPeople.find((p) => Number(p.id) === Number(followId));
      }

      if (!targetPerson || typeof targetPerson.u !== 'number' || typeof targetPerson.v !== 'number') {
        return;
      }

      const target = worldFromPlane(targetPerson.u, targetPerson.v);
      const lerp = 0.14;
      camera.target.x += (target.x - camera.target.x) * lerp;
      camera.target.z += (target.z - camera.target.z) * lerp;
      const desiredY = topViewEnabled ? 0.0 : 0.25;
      camera.target.y += (desiredY - camera.target.y) * 0.08;
    }

    function drawLine3D(a, b, basis, width, height, style, lw = 1) {
      const p0 = project(a, basis, width, height);
      const p1 = project(b, basis, width, height);
      if (!p0 || !p1) return;
      ctx.strokeStyle = style;
      ctx.lineWidth = lw;
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
    }

    function drawFloor(basis, width, height) {
      const step = 0.2;
      const min = -1;
      const max = 1;

      for (let t = min; t <= max + 1e-6; t += step) {
        const major = Math.abs(t) < 1e-6 || Math.abs(Math.abs(t) - 1) < 1e-6;
        const alpha = major ? 0.48 : 0.2;
        drawLine3D(
          { x: min, y: 0, z: t },
          { x: max, y: 0, z: t },
          basis,
          width,
          height,
          `rgba(255,255,255,${alpha})`,
          major ? 2 : 1
        );
        drawLine3D(
          { x: t, y: 0, z: min },
          { x: t, y: 0, z: max },
          basis,
          width,
          height,
          `rgba(255,255,255,${alpha})`,
          major ? 2 : 1
        );
      }

      if (debugEnabled) {
        drawLine3D({ x: -1.2, y: 0, z: 0 }, { x: 1.2, y: 0, z: 0 }, basis, width, height, 'rgba(0,255,136,0.9)', 2.5);
        drawLine3D({ x: 0, y: 0, z: -1.2 }, { x: 0, y: 0, z: 1.2 }, basis, width, height, 'rgba(0,200,255,0.9)', 2.5);
      }
    }

    function drawPeople3D(people, basis, width, height) {
      const drawList = [];
      let firstXYZ = null;
      for (const p of people) {
        if (typeof p.id !== 'number') continue;
        if (typeof p.u !== 'number' || typeof p.v !== 'number') continue;
        const foot = worldFromPayload(p);
        const head = { x: foot.x, y: 1.7, z: foot.z };
        const pf = project(foot, basis, width, height);
        const ph = project(head, basis, width, height);
        if (!pf || !ph) continue;
        drawList.push({ id: p.id, foot: pf, head: ph, z: (pf.z + ph.z) * 0.5, depthRel: p.depth_rel });
        if (!firstXYZ) {
          firstXYZ = { id: p.id, x: foot.x, y: foot.y, z: foot.z };
        }
      }

      drawList.sort((a, b) => b.z - a.z);

      for (const item of drawList) {
        const bodyLen = Math.hypot(item.head.x - item.foot.x, item.head.y - item.foot.y);
        const radius = clamp(bodyLen * 0.09, 4, 14);

        ctx.strokeStyle = 'rgba(0,255,136,0.95)';
        ctx.lineWidth = clamp(bodyLen * 0.14, 2.5, 8);
        ctx.beginPath();
        ctx.moveTo(item.foot.x, item.foot.y);
        ctx.lineTo(item.head.x, item.head.y);
        ctx.stroke();

        ctx.fillStyle = 'rgba(0,255,136,0.2)';
        ctx.beginPath();
        ctx.arc(item.foot.x, item.foot.y, radius * 1.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#00ff88';
        ctx.beginPath();
        ctx.arc(item.head.x, item.head.y, radius * 0.75, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#f5f5f5';
        ctx.font = '12px Segoe UI';
        const label = `ID ${item.id}`;
        ctx.fillText(label, item.head.x + 8, item.head.y - 8);

        if (debugEnabled && typeof item.depthRel === 'number') {
          ctx.fillStyle = 'rgba(180,220,255,0.9)';
          ctx.font = '11px Segoe UI';
          ctx.fillText(`z ${item.depthRel.toFixed(2)}`, item.head.x + 8, item.head.y + 8);
        }
      }

      metaEl.innerHTML = `<span>People: ${drawList.length}</span>`;
      if (firstXYZ) {
        xyzEl.innerHTML = `<span>ID ${firstXYZ.id} · X ${firstXYZ.x.toFixed(2)}m · Y ${firstXYZ.y.toFixed(2)}m · Z ${firstXYZ.z.toFixed(2)}m</span>`;
      } else {
        xyzEl.innerHTML = '<span>XYZ: —</span>';
      }
    }

    function drawMarkerAndRealCamera(basis, width, height) {
      const half = markerSizeM * 0.5;
      const a = { x: -half, y: 0, z: -half };
      const b = { x: half, y: 0, z: -half };
      const c = { x: half, y: 0, z: half };
      const d = { x: -half, y: 0, z: half };

      drawLine3D(a, b, basis, width, height, 'rgba(255,180,0,0.95)', 2.5);
      drawLine3D(b, c, basis, width, height, 'rgba(255,180,0,0.95)', 2.5);
      drawLine3D(c, d, basis, width, height, 'rgba(255,180,0,0.95)', 2.5);
      drawLine3D(d, a, basis, width, height, 'rgba(255,180,0,0.95)', 2.5);

      const markerCenter = project({ x: 0, y: 0, z: 0 }, basis, width, height);
      if (markerCenter) {
        ctx.fillStyle = 'rgba(255,210,130,0.95)';
        ctx.font = '12px Segoe UI';
        ctx.fillText(`Marker ID ${markerId} (calibración)`, markerCenter.x + 8, markerCenter.y - 8);
      }

      if (screenConfig && screenConfig.enabled) {
        const cx = Number(screenConfig.x_m || 0);
        const z = Number(screenConfig.z_m || 1.2);
        const w = Math.max(0.2, Number(screenConfig.width_m || 3.5));
        const h = Math.max(0.2, Number(screenConfig.height_m || 2.0));
        const yaw = (Number(screenConfig.yaw_deg || 0) * Math.PI) / 180;

        const hx = Math.cos(yaw) * (w * 0.5);
        const hz = Math.sin(yaw) * (w * 0.5);

        const s0 = { x: cx - hx, y: 0, z: z - hz };
        const s1 = { x: cx + hx, y: 0, z: z + hz };
        const s2 = { x: cx + hx, y: h, z: z + hz };
        const s3 = { x: cx - hx, y: h, z: z - hz };

        drawLine3D(s0, s1, basis, width, height, 'rgba(80,160,255,0.95)', 3);
        drawLine3D(s1, s2, basis, width, height, 'rgba(80,160,255,0.95)', 3);
        drawLine3D(s2, s3, basis, width, height, 'rgba(80,160,255,0.95)', 3);
        drawLine3D(s3, s0, basis, width, height, 'rgba(80,160,255,0.95)', 3);

        const screenCenter = project({ x: cx, y: h * 0.5, z }, basis, width, height);
        if (screenCenter) {
          ctx.fillStyle = 'rgba(190,220,255,0.98)';
          ctx.font = '12px Segoe UI';
          ctx.fillText('SCREEN (LED)', screenCenter.x + 8, screenCenter.y - 8);
        }

        const cameraMountBase = { x: cx, y: h, z };
        const cameraMountTop = { x: cx, y: realCameraHeightM, z };
        drawLine3D(cameraMountBase, cameraMountTop, basis, width, height, 'rgba(255,80,80,0.95)', 2.5);

        const cameraPoint = project(cameraMountTop, basis, width, height);
        if (cameraPoint) {
          ctx.fillStyle = 'rgba(255,120,120,0.95)';
          ctx.beginPath();
          ctx.arc(cameraPoint.x, cameraPoint.y, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#ffd5d5';
          ctx.font = '12px Segoe UI';
          ctx.fillText(`${cameraName} · ${realCameraHeightM.toFixed(2)}m`, cameraPoint.x + 8, cameraPoint.y - 8);
        }
      } else {
        const camGround = { x: 0, y: 0, z: -(markerSizeM * 2.0) };
        const camTop = { x: camGround.x, y: realCameraHeightM, z: camGround.z };
        drawLine3D(camGround, camTop, basis, width, height, 'rgba(255,80,80,0.95)', 2.5);

        const p = project(camTop, basis, width, height);
        if (p) {
          ctx.fillStyle = 'rgba(255,120,120,0.95)';
          ctx.beginPath();
          ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#ffd5d5';
          ctx.font = '12px Segoe UI';
          ctx.fillText(`${cameraName} · ${realCameraHeightM.toFixed(2)}m`, p.x + 8, p.y - 8);
        }
      }
    }

    function renderScene() {
      const width = stage.clientWidth;
      const height = stage.clientHeight;
      if (width <= 0 || height <= 0) return;

      ctx.clearRect(0, 0, width, height);

      updateFollowTarget();

      const basis = getCameraBasis();
      drawFloor(basis, width, height);
      drawMarkerAndRealCamera(basis, width, height);
      if (planeReady) {
        drawPeople3D(lastPeople, basis, width, height);
      } else {
        metaEl.innerHTML = '<span>People: 0</span>';
        xyzEl.innerHTML = '<span>XYZ: —</span>';
      }

      requestAnimationFrame(renderScene);
    }

    function setDebug(enabled) {
      debugEnabled = !!enabled;
      btnDebug.classList.toggle('on', debugEnabled);
      saveUiState();
    }

    function setFreeze(enabled) {
      freezeEnabled = !!enabled;
      btnFreeze.classList.toggle('on', freezeEnabled);
      btnFreeze.textContent = freezeEnabled ? 'Resume Trails' : 'Freeze Trails';
      saveUiState();
    }

    canvas.addEventListener('pointerdown', (e) => {
      pointerState.down = true;
      pointerState.mode = (e.shiftKey || e.button === 1) ? 'pan' : 'orbit';
      pointerState.x = e.clientX;
      pointerState.y = e.clientY;
      canvas.classList.add('dragging');
      canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!pointerState.down) return;
      const dx = e.clientX - pointerState.x;
      const dy = e.clientY - pointerState.y;
      pointerState.x = e.clientX;
      pointerState.y = e.clientY;

      if (pointerState.mode === 'orbit') {
        if (!isoLockEnabled && !topViewEnabled) {
          camera.yaw -= dx * 0.006;
          camera.pitch = clamp(camera.pitch - dy * 0.005, 0.15, 1.35);
        }
      } else {
        const basis = getCameraBasis();
        const panScale = camera.distance * 0.0018;
        camera.target.x += (-dx * basis.right.x + dy * basis.up.x) * panScale;
        camera.target.y += (-dx * basis.right.y + dy * basis.up.y) * panScale;
        camera.target.z += (-dx * basis.right.z + dy * basis.up.z) * panScale;
      }

      sharedViewDirtyUntil = performance.now() + 2200;
      updateCamHud();
    });

    canvas.addEventListener('pointerup', (e) => {
      pointerState.down = false;
      canvas.classList.remove('dragging');
      try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
      scheduleSharedViewSave();
    });

    canvas.addEventListener('pointercancel', (e) => {
      pointerState.down = false;
      canvas.classList.remove('dragging');
      try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
      scheduleSharedViewSave();
    });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const factor = Math.exp(e.deltaY * 0.0012);
      camera.distance = clamp(camera.distance * factor, 1.6, 12.0);
      sharedViewDirtyUntil = performance.now() + 2200;
      updateCamHud();
      scheduleSharedViewSave();
    }, { passive: false });

    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    function connect() {
      const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${wsProto}://${location.host}/ws/positions`);

      ws.onopen = () => setConn(true, 'WS posiciones conectado');

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type !== 'positions') return;
        if (!freezeEnabled) {
          lastPeople = Array.isArray(msg.people) ? msg.people : [];
        }
        if (typeof msg.camera_name === 'string' && msg.camera_name.trim()) {
          cameraName = msg.camera_name.trim();
        }
        if (typeof msg.aruco_marker_id === 'number') {
          markerId = msg.aruco_marker_id;
        }
        if (typeof msg.aruco_marker_size_mm === 'number') {
          markerSizeM = Math.max(0.02, msg.aruco_marker_size_mm / 1000);
        }
        if (typeof msg.camera_height_m === 'number') {
          realCameraHeightM = Math.max(0.2, msg.camera_height_m);
        }
        if (msg.screen_config && typeof msg.screen_config === 'object') {
          screenConfig = {
            ...screenConfig,
            ...msg.screen_config,
          };
        }
        if (msg.visual_config && typeof msg.visual_config === 'object') {
          applySharedVisualConfig(msg.visual_config);
        }
        if (!pointerState.down && performance.now() >= sharedViewDirtyUntil && msg.view_config && typeof msg.view_config === 'object') {
          applySharedViewConfig(msg.view_config);
        }
        setPlane(!!msg.plane_ready);
      };

      ws.onclose = () => {
        setConn(false, 'Reconectando…');
        setTimeout(connect, 1200);
      };

      ws.onerror = () => {
        try { ws.close(); } catch (_) {}
      };
    }

    btnDebug.addEventListener('click', () => setDebug(!debugEnabled));
    btnFreeze.addEventListener('click', () => setFreeze(!freezeEnabled));
    btnTop.addEventListener('click', () => applyTopView(!topViewEnabled));
    btnIsoLock.addEventListener('click', () => setIsoLock(!isoLockEnabled));
    btnFollow.addEventListener('click', () => setFollowMode('id'));
    btnFollowAuto.addEventListener('click', () => setFollowMode('auto'));
    btnFollowOff.addEventListener('click', () => setFollowMode('off'));
    btnReset.addEventListener('click', resetCamera);
    btnLoadShared.addEventListener('click', loadSharedViewConfig);
    btnSaveShared.addEventListener('click', saveSharedViewConfig);
    btnSaveParticles.addEventListener('click', saveSharedVisualConfig);
    particlesLifeInput.addEventListener('input', scheduleSharedVisualSave);
    particlesLifeInput.addEventListener('change', scheduleSharedVisualSave);
    window.addEventListener('resize', resizeCanvas);

    const state = loadUiState();
    setDebug(state.debugEnabled);
    setFreeze(state.freezeEnabled);
    setIsoLock(state.isoLockEnabled);
    if (state.followId !== null && state.followId !== '') {
      const parsed = parseInt(state.followId, 10);
      if (Number.isFinite(parsed)) {
        followId = parsed;
        followIdInput.value = String(parsed);
      }
    }
    followEnabled = !!state.followEnabled;
    followAuto = !!state.followAuto;
    updateFollowHud();
    applyTopView(state.topViewEnabled);
    if (!state.topViewEnabled) {
      resetCamera();
    }
    loadSharedViewConfig();
    loadSharedVisualConfig();
    resizeCanvas();
    renderScene();
    connect();
  </script>
</body>
</html>
